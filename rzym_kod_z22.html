<p>rzymowski<br>CSS - Kaskadowe Arkusze Stylów(z ang.Cascading Style Sheets) jest to specjalny <br>język
stworzony w celu elastycznego zarządzania sposobem<br> formatowania (wyglądem) elementów <br>
znajdujących się na stronach WWW. </p>
<p id="gruby_rzymowski">rzymowski<br> w html modyfikacja wyglądu elementów strony jest <br>
bardzo żmudna (atrybuty i znaczniki które <br>
za to odpowiadają, są porozrzucane w 
różnych<br> miejscach kodu, mieszając się ze 
strukturą dokumentu).</p>
<h1 id="dlawszystkich_rzymowski">rzymowski<br>w css rozdzielenie struktury i prezentacji 
dokumentów czyli: wszystkie polecenia<br>
dotyczące formatowania można umieścić w 
jednym miejscu (tzw. arkuszu) i powiązać je <br>
z konkretnymi elementami, wstawionymi za 
pomocą czystego (X)HTML. Taki sposób <br>
sprawia, że modyfikacja wyglądu stron może 
przebiegać dużo sprawniej.</h1>
<div id="dlawszystkich_rzymowski">rzymowski <br>Przestarzałe atrybuty i znaczniki, znajdujące się bezpośrednio<br> w składni HTML, które 
dotyczą formatowania (elementy zdeprecjonowane),<br> będą stopniowo wycofywane przez 
producentów przeglądarek internetowych,<br> na rzecz rekomendowanych analogicznych 
deklaracji CSS. </div>
